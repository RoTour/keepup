# Dependabot - keep dependencies and, importantly for a public repo, the pinned
# GitHub Actions up to date so security fixes land promptly.
version: 2
updates:
  # The CI actions themselves (checkout, setup-*, docker/*, aws-actions/*).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Frontend npm dependencies.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Backend Gradle dependencies.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
