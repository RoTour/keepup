# secrets-scan - PR gate. Fails the PR on any committed secret.
#
# The repo is PUBLIC and built in public: a secret is compromised the instant it
# lands in a pushed commit. This gate scans BOTH the full git history and the
# PR's diff range, and fails on any hit (gitleaks exits 1 by default when a leak
# is found).
#
# pull_request only: no credentials needed; runs on fork PRs too so a leaked
# secret is caught before review.
name: secrets-scan

on:
  pull_request:
    branches: [staging, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned. Bump deliberately; do not float to a tag/latest.
  GITLEAKS_VERSION: '8.30.1'

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      # Actions are SHA-pinned (supply-chain hardening); the trailing version
      # comment lets Dependabot bump the pin. Do not replace with a bare tag.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the history scan can see every commit, not just the
          # tip.
          fetch-depth: 0

      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Whole history. Catches a secret that was committed and later "removed"
      # in a follow-up commit - it is still in the objects and still leaked.
      - name: gitleaks - full history
        run: gitleaks git . --redact --no-banner --verbose

      # The PR's own commits explicitly. Redundant with the history scan today,
      # but stays correct if history is ever allowlisted via a baseline.
      # base/head are GitHub-computed SHAs (not injectable), but they are routed
      # through env rather than interpolated into the shell, so the "untrusted
      # context never reaches a shell directly" rule holds uniformly here.
      - name: gitleaks - PR diff range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: gitleaks git . --redact --no-banner --verbose --log-opts "$BASE_SHA..$HEAD_SHA"
