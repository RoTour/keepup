# keepup — local development stack.
#
# Backing services (Postgres, RabbitMQ, Mailpit), a one-shot `migrate` service
# that applies the Flyway schema, and the application (`app`). On `up` the order
# is: postgres healthy -> migrate runs to completion -> app starts.
#
# Usage:  cp .env.example .env && docker compose -f compose.dev.yml up -d
# See README.md.

# Named project => dedicated network (`keepup-dev_default`) and volume prefix,
# so this stack cannot collide with other stacks on the same machine.
name: keepup-dev

services:
  postgres:
    image: postgres:15.8-alpine
    # 15.8 is pinned on purpose. Production is Supabase's supabase/postgres:15.8.1.085.
    # Dev, Testcontainers and prod must run the same Postgres, otherwise we test a
    # database we do not run. Do not "upgrade" this without changing prod first.
    container_name: keepup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Bind published ports to loopback by default. Without the ${BIND_ADDR}
      # prefix, Docker publishes on 0.0.0.0, so on untrusted Wi-Fi any device on
      # the segment could reach this database as keepup/keepup. localhost still
      # works exactly as before; LAN exposure is a conscious BIND_ADDR=0.0.0.0
      # opt-in. This is a public build — the default must be safe.
      - "${BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schemas only. Table DDL belongs to Flyway, not here.
      # NOTE: scripts in this directory run exactly once — on first init of an
      # empty data volume. Changing them later requires `down -v`.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # -h 127.0.0.1 is load-bearing. During initialisation the entrypoint runs a
      # temporary server bound to the unix socket only (listen_addresses=''), so a
      # socket-based pg_isready reports healthy while the init scripts are still
      # running. Probing TCP means "healthy" implies: real server up, init done,
      # schemas created — which is what dependents actually need to wait for.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: keepup-rabbitmq
    restart: unless-stopped
    environment:
      # An explicit user is deliberate. The built-in `guest` account is restricted
      # to loopback connections, and a published port arrives from the Docker
      # gateway address — so `guest` cannot log into the management UI from the
      # host. A named user is created as a full administrator and has no such
      # restriction. The M2 demo depends on that UI being usable.
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      # Default vhost "/" is fine for dev.
    ports:
      # Loopback-only by default — see the postgres ports comment. The management
      # UI in particular exposes a full administrator; it must not reach the LAN.
      - "${BIND_ADDR:-127.0.0.1}:${RABBITMQ_PORT:-5672}:5672"      # AMQP
      - "${BIND_ADDR:-127.0.0.1}:${RABBITMQ_UI_PORT:-15672}:15672" # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      # check_port_connectivity does a TCP check on EVERY listener's port,
      # including the management HTTP listener on 15672. Plain `ping` only proves
      # the Erlang VM answers — it would report healthy even if the management UI
      # (the M2 demo criterion) were not accepting connections.
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  mailpit:
    image: axllent/mailpit:v1.30.4
    # Mailpit, not MailHog. MailHog is archived upstream and ships an amd64-only
    # manifest, so it would run under emulation here. Mailpit is maintained, is
    # multi-arch (native arm64), and is a drop-in on the same 1025/8025 ports.
    # Deliberately no `platform:` override — this must resolve natively.
    # Pinned to a concrete tag (like postgres/rabbitmq) so a fresh pull cannot
    # silently swap the image out from under us.
    container_name: keepup-mailpit
    restart: unless-stopped
    ports:
      # Loopback-only by default — see the postgres ports comment. Captured dev
      # mail is readable on the UI without auth; keep it off the LAN.
      - "${BIND_ADDR:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP sink
      - "${BIND_ADDR:-127.0.0.1}:${MAILPIT_UI_PORT:-8025}:8025"   # web UI
    healthcheck:
      # Mailpit ships a first-class healthcheck subcommand (verified: exit 0 when
      # serving, exit 1 when not). Preferred over probing a hardcoded URL with
      # wget, because it honours Mailpit's own bind address and webroot config.
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  migrate:
    # One-shot Flyway migration. Runs `flyway migrate` against Postgres, applies
    # every pending V*.sql, then EXITS 0 — it is not a long-running service, so it
    # has no healthcheck and no restart policy (a `restart` would re-run it in a
    # loop). The app never carries Flyway or a JDBC driver on its own classpath for
    # M0; migrations are this container's job alone (ADR-0022 keeps Flyway the
    # schema owner without coupling it to the DB-free app).
    #
    # Pinned to 12.4.0 to match the app's future BOM-managed Flyway 12.x. This tag
    # is native linux/arm64 (verified by pull + image inspect on this arm64 Mac),
    # so it runs without emulation.
    image: flyway/flyway:12.4.0
    container_name: keepup-migrate
    command: migrate
    environment:
      # DB creds reuse the SAME non-secret dev vars Postgres uses — no new secret.
      # Host is the compose service name `postgres` on the internal network.
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      # postgres is already gated healthy below; the retries are a cheap belt against
      # the brief window between "accepting connections" and "ready for DDL".
      FLYWAY_CONNECT_RETRIES: "10"
    volumes:
      # The classpath migration dir (backend/app/.../db/migration) mounted read-only
      # at the image's default locations root (filesystem:/flyway/sql). Same files
      # M1's app-side Flyway will validate JPA against — one source of truth.
      - ../../backend/app/src/main/resources/db/migration:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  app:
    # ONE image, three roles. Here it runs as `web`; worker/relay are the same
    # artifact with a different KEEPUP_ROLES. Build context is the repo ROOT so the
    # Dockerfile can see the whole Gradle build (../.. from this compose file).
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: keepup-app
    restart: unless-stopped
    environment:
      # Role is a runtime duty, not a Spring profile. web = HTTP + actuator.
      KEEPUP_ROLES: web
    ports:
      # Loopback-only by default, like every other service here — see the postgres
      # ports comment. The Angular dev proxy forwards /api and /ws to 8080.
      - "${BIND_ADDR:-127.0.0.1}:${APP_PORT:-8080}:8080"
    depends_on:
      # Topology for later slices: the app doesn't touch the DB yet, but the roles
      # that will (worker/relay) need Postgres up and initialised first. Waiting on
      # `service_healthy` means schemas are already created (see the healthcheck).
      postgres:
        condition: service_healthy
      # And the schema must be migrated before any DB-touching role boots. These
      # conditions apply on `up`, not `restart` (which is correct: a bare app
      # restart should not re-block on a one-shot that already finished).
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # busybox wget ships in the alpine base — no extra tooling added to the image.
      # /actuator/health returns UP in every role once the context is up.
      test:
        ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  pgdata:
  rabbitmq-data:
